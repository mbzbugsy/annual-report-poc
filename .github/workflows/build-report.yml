name: Build annual report

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MANAGEMENT_REPORT_MODE: synthetic

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Python tests
        run: python3 -m unittest discover -v -s tests -p 'test_*.py'

      - name: Create generated and build directories
        run: mkdir -p generated build

      - name: Extract management report contracts from synthetic DOCX fixture
        run: |
          python3 tools/extract_management_report.py \
            --input data/mock/management_report_fixture.docx \
            --metadata data/report_metadata.json \
            --raw-output generated/management-report-raw.json \
            --semantic-output generated/management-report.json

      - name: Render management report pages 2-4 partial
        run: |
          python3 tools/render_management_report_tex.py \
            --semantic-input generated/management-report.json \
            --raw-input generated/management-report-raw.json \
            --metadata data/report_metadata.json \
            --override data/mock/management_report_page4_preview_override.json \
            --output generated/management-report.tex \
            --provenance-output generated/management-report.provenance.json

      - name: Render report metadata partial
        run: |
          python3 tools/render_report_metadata_tex.py \
            --input data/report_metadata.json \
            --output generated/report-metadata.tex

      - name: Render synthetic income statement partial
        run: |
          python3 tools/render_income_statement_tex.py \
            --input data/mock/income_statement_current_period_fixture.json \
            --output generated/income-statement.tex \
            --previous-period-fixture data/mock/income_statement_previous_period_fixture.json

      - name: Render synthetic balance sheet partial
        run: |
          python3 tools/render_balance_sheet_tex.py \
            --input data/mock/balance_sheet_current_period_fixture.json \
            --previous-period-fixture data/mock/balance_sheet_previous_period_fixture.json \
            --output generated/balance-sheet.tex

      - name: Render synthetic cash-flow partial
        run: |
          python3 tools/render_cash_flow_tex.py \
            --input data/mock/cash_flow_fixture.json \
            --output generated/cash-flow.tex \
            --metadata data/report_metadata.json

      - name: Verify generated partials exist
        run: |
          test -f generated/management-report-raw.json
          test -f generated/management-report.json
          test -f generated/management-report.tex
          test -f generated/management-report.provenance.json
          test -f generated/report-metadata.tex
          test -f generated/income-statement.tex
          test -f generated/balance-sheet.tex
          test -f generated/cash-flow.tex

      - name: Build PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: template/main.tex
          args: -pdf -interaction=nonstopmode -halt-on-error -outdir=build

      - name: Verify LaTeX output exists
        run: test -f build/main.pdf

      - name: Move final PDF
        run: |
          sudo chown -R "$(id -u):$(id -g)" build
          mv -f build/main.pdf build/annual-report.pdf
          test -f build/annual-report.pdf

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: annual-report
          path: build/annual-report.pdf
          if-no-files-found: error